name: Test module

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules from PSGallery (pwsh)
        shell: pwsh
        run: |
          Set-PSResourceRepository PSGallery -Trusted
          Install-PSResource pslrm -Prerelease -Quiet -Reinstall -Scope CurrentUser
          Restore-PSLResource

      - name: Execute All Tests
        shell: pwsh
        run: |
          Invoke-PSLResource Invoke-Psake '-taskList','TestAll' | Tee-Object -Variable result
          if (-not $result[-1].Success) { exit 1 }
